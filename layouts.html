<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>CSS Layouts</title>
    <link href="./layouts.html" type="text/css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@500&display=swap" rel="stylesheet">
</head>

<body>
    <div class="grid">

        <div class="item" id="grid-item-a"><p>Apple</p></div>
        <div class="item" id="grid-item-b"><p>Bottle</p></div>
        <div class="item" id="grid-item-c"><p>Cattle</p></div>
        <div class="item" id="grid-item-d"><p>Ditto</p></div>
        
        <div class="parent" id="parent-1">
            <div class="item flex" id="child-a"><p>A</p></div>
            <div class="item flex" id="child-b"><p>B</p></div>
            <div class="item flex" id="child-c"><p>C</p></div>
            <div class="item flex" id="child-d"><p>D</p></div>
            <div class="item flex" id="child-e"><p>E</p></div>
        </div>
        
        <div class="parent" id="parent-2">
            <div class="item child" id="child-a"><p>A</p></div>
            <div class="item child" id="child-b"><p>B</p></div>
            <div class="item child" id="child-c"><p>C</p></div>
        </div>

    </div>    
</body>
</html>
